name: Release yeelight-home

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release tag
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: Checkout release tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          git checkout "$RELEASE_TAG"
          echo "GORELEASER_CURRENT_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Test
        run: go test ./...

      - name: Verify npm package version
        shell: bash
        run: |
          set -euo pipefail
          expected="${RELEASE_TAG#v}"
          actual="$(node -p 'require("./package.json").version')"
          if [ "$actual" != "$expected" ]; then
            echo "package.json version $actual does not match release tag $RELEASE_TAG" >&2
            exit 2
          fi

      - name: Resolve optional distribution channels
        shell: bash
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
          WINGET_REPOSITORY_OWNER: ${{ vars.WINGET_REPOSITORY_OWNER }}
          WINGET_REPOSITORY_NAME: ${{ vars.WINGET_REPOSITORY_NAME }}
          WINGET_REPOSITORY_BRANCH: ${{ vars.WINGET_REPOSITORY_BRANCH }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
          AUR_GIT_URL: ${{ vars.AUR_GIT_URL }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          skips=""
          add_skip() {
            if [ -z "$skips" ]; then
              skips="$1"
            else
              skips="$skips,$1"
            fi
          }
          set_env_value() {
            name="$1"
            value="$2"
            delimiter="EOF_${name}_$(date +%s%N)"
            printf '%s<<%s\n%s\n%s\n' "$name" "$delimiter" "$value" "$delimiter" >> "$GITHUB_ENV"
          }

          if [ -n "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value HOMEBREW_TAP_GITHUB_TOKEN "$HOMEBREW_TAP_GITHUB_TOKEN"
          else
            echo "HOMEBREW_TAP_ENABLED=0" >> "$GITHUB_ENV"
            add_skip homebrew
          fi

          if [ -n "${SCOOP_BUCKET_GITHUB_TOKEN:-}" ]; then
            echo "SCOOP_BUCKET_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value SCOOP_BUCKET_GITHUB_TOKEN "$SCOOP_BUCKET_GITHUB_TOKEN"
          else
            echo "SCOOP_BUCKET_ENABLED=0" >> "$GITHUB_ENV"
            add_skip scoop
          fi

          if [ -n "${WINGET_GITHUB_TOKEN:-}" ] && [ -n "${WINGET_REPOSITORY_OWNER:-}" ] && [ -n "${WINGET_REPOSITORY_NAME:-}" ]; then
            echo "WINGET_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value WINGET_GITHUB_TOKEN "$WINGET_GITHUB_TOKEN"
            set_env_value WINGET_REPOSITORY_OWNER "$WINGET_REPOSITORY_OWNER"
            set_env_value WINGET_REPOSITORY_NAME "$WINGET_REPOSITORY_NAME"
            set_env_value WINGET_REPOSITORY_BRANCH "${WINGET_REPOSITORY_BRANCH:-yeelight-home-${RELEASE_TAG#v}}"
          else
            echo "WINGET_ENABLED=0" >> "$GITHUB_ENV"
            add_skip winget
          fi

          if [ -n "${AUR_KEY:-}" ]; then
            echo "AUR_ENABLED=1" >> "$GITHUB_ENV"
            echo "AUR_PUBLISH_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value AUR_KEY "$AUR_KEY"
          else
            echo "AUR_ENABLED=0" >> "$GITHUB_ENV"
            echo "AUR_PUBLISH_ENABLED=0" >> "$GITHUB_ENV"
            add_skip aur
          fi
          if [ -n "${AUR_GIT_URL:-}" ]; then
            set_env_value AUR_GIT_URL "$AUR_GIT_URL"
          fi

          if [ -n "${SNAPCRAFT_STORE_CREDENTIALS:-}" ]; then
            echo "SNAPCRAFT_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value SNAPCRAFT_STORE_CREDENTIALS "$SNAPCRAFT_STORE_CREDENTIALS"
          else
            echo "SNAPCRAFT_ENABLED=0" >> "$GITHUB_ENV"
            add_skip snapcraft
          fi

          docker_enabled=1
          echo "GHCR_ENABLED=1" >> "$GITHUB_ENV"
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "DOCKERHUB_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value DOCKERHUB_USERNAME "$DOCKERHUB_USERNAME"
            set_env_value DOCKERHUB_TOKEN "$DOCKERHUB_TOKEN"
            set_env_value DOCKERHUB_IMAGE "${DOCKERHUB_IMAGE:-${DOCKERHUB_USERNAME}/yeelight-home}"
          else
            echo "DOCKERHUB_ENABLED=0" >> "$GITHUB_ENV"
          fi
          if [ "$docker_enabled" != "1" ]; then
            add_skip docker
          fi

          if [ -n "${NPM_TOKEN:-}" ]; then
            echo "NPM_ENABLED=1" >> "$GITHUB_ENV"
            set_env_value NPM_TOKEN "$NPM_TOKEN"
          else
            echo "NPM_ENABLED=0" >> "$GITHUB_ENV"
          fi

          if [ -n "$skips" ]; then
            echo "GORELEASER_SKIP_ARGS=--skip=$skips" >> "$GITHUB_ENV"
          else
            echo "GORELEASER_SKIP_ARGS=" >> "$GITHUB_ENV"
          fi

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: anchore/sbom-action/download-syft@v0.24.0

      - name: Install Snapcraft
        if: ${{ env.SNAPCRAFT_ENABLED == '1' }}
        run: sudo snap install snapcraft --classic

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_ENABLED == '1' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "v2.15.2"
          args: release --clean ${{ env.GORELEASER_SKIP_ARGS }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ env.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ env.SCOOP_BUCKET_GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ env.DOCKERHUB_TOKEN }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          AUR_KEY: ${{ env.AUR_KEY }}
          AUR_GIT_URL: ${{ env.AUR_GIT_URL }}
          SNAPCRAFT_STORE_CREDENTIALS: ${{ env.SNAPCRAFT_STORE_CREDENTIALS }}
          WINGET_GITHUB_TOKEN: ${{ env.WINGET_GITHUB_TOKEN }}
          WINGET_REPOSITORY_OWNER: ${{ env.WINGET_REPOSITORY_OWNER }}
          WINGET_REPOSITORY_NAME: ${{ env.WINGET_REPOSITORY_NAME }}
          WINGET_REPOSITORY_BRANCH: ${{ env.WINGET_REPOSITORY_BRANCH }}

      - name: Publish npm package
        if: ${{ env.NPM_ENABLED == '1' }}
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm publish --access public
